name: Docker Build CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
  pull_request:
    branches:
      - main
      - develop

jobs:
  docker-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt de code
        uses: actions/checkout@v4

      - name: Build Docker Compose
        run: docker compose build